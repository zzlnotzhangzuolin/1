
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoScene 地图应用 - 美国人口 + GDP底图</title>
    <!-- ArcGIS JS API 5.0 最新版 -->
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/5.0/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* ========== 1. 页眉区域 ========== */
        .header {
            height: 70px;
            background: linear-gradient(90deg, #165DFF, #4080FF);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 99;
            position: relative;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 500;
        }
        .header span {
            margin-left: 20px;
            font-size: 14px;
            opacity: 0.9;
        }

        /* ========== 2. 主体布局：地图 + 底图库 ========== */
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        /* ========== 3. 底图库区域（左侧） ========== */
        .basemap-panel {
            width: 260px;
            background: #f7f8fa;
            border-right: 1px solid #e5e6eb;
            padding: 18px;
            overflow-y: auto;
        }
        .basemap-panel h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            padding-left: 8px;
            border-left: 4px solid #165DFF;
        }
        .basemap-item {
            padding: 10px 12px;
            background: #fff;
            border: 1px solid #e5e6eb;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .basemap-item:hover {
            background: #e8f3ff;
            border-color: #165DFF;
        }

        /* ========== 4. 地图主区域 ========== */
        #viewDiv {
            flex: 1;
            position: relative;
        }
    </style>
</head>
<body>

<!-- 1. 页眉区域 -->
<div class="header">
    <h1>GeoScene 专业地图应用</h1>
    <span>GDP底图 | 美国人口专题图层</span>
</div>

<!-- 2. 主体：底图库 + 地图区域 -->
<div class="main-container">
    <!-- 底图库区域 -->
    <div class="basemap-panel">
        <h3>🌍 底图切换</h3>
        <div class="basemap-item" data-basemap="streets">街道地图</div>
        <div class="basemap-item" data-basemap="satellite">影像地图</div>
        <div class="basemap-item" data-basemap="topographic">地形地图</div>
        <div class="basemap-item" data-basemap="dark-gray">灰色地图</div>
        <div class="basemap-item" data-basemap="osm">OSM地图</div>
    </div>

    <!-- 地图显示区域 -->
    <div id="viewDiv"></div>
</div>

<script>
require([
    "esri/Map",
    "esri/views/MapView",
    "esri/layers/FeatureLayer",
    "esri/layers/WebTileLayer",
    "esri/layers/WFSLayer",
    "esri/widgets/ScaleBar",
    "esri/widgets/Legend",
    "esri/widgets/Search",
    "esri/widgets/LayerList"
], (
    Map, MapView,
    FeatureLayer, WebTileLayer, WFSLayer,
    ScaleBar, Legend, Search, LayerList
) => {

    // ======================================
    // 1. 加载你提供的 GDP 底图（WFS）
    // ======================================
    const gdpBasemap = new WFSLayer({
        url: "https://www.geosceneonline.cn/server/services/Hosted/GDPHAHHHHHHH/MapServer/WFSServer",
        title: "GDP底图",
        visible: true
    });

    // ======================================
    // 2. 创建地图，加载自定义底图
    // ======================================
    const map = new Map({
        basemap: "streets", // 基础底图
        layers: [gdpBasemap] // 添加你的GDP底图
    });

    // ======================================
    // 3. 地图视图：定位到美国
    // ======================================
    const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-98.5855, 39.8333], // 美国中心坐标
        zoom: 4
    });

    // ======================================
    // 4. 加载你提供的 美国人口地图 专题图层
    // ======================================
    const usaPopulationLayer = new FeatureLayer({
        url: "https://www.geosceneonline.cn/server/rest/services/Hosted/美国人口地图zzl/FeatureServer/0",
        title: "美国人口分布",
        visible: true
    });
    map.add(usaPopulationLayer);

    // ======================================
    // 5. 添加必备微件（作业全部要求）
    // ======================================

    // 比例尺
    const scaleBar = new ScaleBar({
        view: view,
        unit: "metric"
    });
    view.ui.add(scaleBar, "bottom-left");

    // 图例
    const legend = new Legend({
        view: view
    });
    view.ui.add(legend, "bottom-right");

    // 搜索框
    const search = new Search({
        view: view
    });
    view.ui.add(search, "top-left");

    // 图层列表（图层控制）
    const layerList = new LayerList({
        view: view
    });
    view.ui.add(layerList, "top-left");

    // ======================================
    // 6. 底图切换功能
    // ======================================
    document.querySelectorAll(".basemap-item").forEach(item => {
        item.addEventListener("click", () => {
            const basemapName = item.dataset.basemap;
            map.basemap = basemapName;
        });
    });

});
</script>

</body>
</html>
