
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoScene 地图应用</title>
    <!-- 改为 4.28 版本 -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .header {
            height: 70px;
            background: linear-gradient(90deg, #165DFF, #4080FF);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 99;
            position: relative;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 500;
        }
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }
        .basemap-panel {
            width: 260px;
            background: #f7f8fa;
            border-right: 1px solid #e5e6eb;
            padding: 18px;
            overflow-y: auto;
        }
        .basemap-panel h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            padding-left: 8px;
            border-left: 4px solid #165DFF;
        }
        .basemap-item {
            padding: 10px 12px;
            background: #fff;
            border: 1px solid #e5e6eb;
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .basemap-item:hover {
            background: #e8f3ff;
            border-color: #165DFF;
        }
        #viewDiv {
            flex: 1;
            position: relative;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>GeoScene 专业地图应用</h1>
    <span>&nbsp;&nbsp;美国人口 | GDP底图 | 完整微件</span>
</div>
<div class="main-container">
    <div class="basemap-panel">
        <h3>🌍 底图切换</h3>
        <div class="basemap-item" data-basemap="streets">街道地图</div>
        <div class="basemap-item" data-basemap="satellite">影像地图</div>
        <div class="basemap-item" data-basemap="topographic">地形地图</div>
        <div class="basemap-item" data-basemap="dark-gray">灰色地图</div>
    </div>
    <div id="viewDiv"></div>
</div>

<script>
require([
    "esri/Map",
    "esri/views/MapView",
    "esri/layers/FeatureLayer",
    "esri/layers/WFSLayer",
    "esri/widgets/ScaleBar",
    "esri/widgets/Legend",
    "esri/widgets/Search",
    "esri/widgets/LayerList"
], function(
    Map, MapView,
    FeatureLayer, WFSLayer,
    ScaleBar, Legend, Search, LayerList
) {
    // GDP 底图
    const gdpLayer = new WFSLayer({
        url: "https://www.geosceneonline.cn/server/services/Hosted/GDPHAHHHHHHH/MapServer/WFSServer",
        title: "GDP底图"
    });

    // 创建地图
    const map = new Map({
        basemap: "streets",
        layers: [gdpLayer]
    });

    // 地图视图
    const view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-98.5855, 39.8333],
        zoom: 4
    });

    // 美国人口图层
    const popLayer = new FeatureLayer({
        url: "https://www.geosceneonline.cn/server/rest/services/Hosted/美国人口地图zzl/FeatureServer/0",
        title: "美国人口分布"
    });
    map.add(popLayer);

    // 微件
    view.ui.add(new ScaleBar({ view: view }), "bottom-left");
    view.ui.add(new Legend({ view: view }), "bottom-right");
    view.ui.add(new Search({ view: view }), "top-left");
    view.ui.add(new LayerList({ view: view }), "top-left");

    // 底图切换
    document.querySelectorAll(".basemap-item").forEach(function(item) {
        item.addEventListener("click", function() {
            map.basemap = item.dataset.basemap;
        });
    });
});
</script>
</body>
</html>
